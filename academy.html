      <!-- Module 1: Ingestion -->
      <template id="content-1">
          <p>Routing multi-gigabyte mezzanine video files through a traditional Node.js backend introduces severe memory bottlenecks, upload timeouts, and high compute costs. This setup utilizes <strong>Direct-to-Cloud (D2C)</strong> ingestion alongside Payload CMS and PostgreSQL to handle relational data modeling and client content management.</p>
          
          <h4>Unified Admin Panel & Relational Topology</h4>
          <p>Content operators upload media packages directly through the tailored Payload collection dashboard. Uploads partition into clean parent-child relational mappings powered by the underlying <code>@payloadcms/db-postgres</code> adapter:</p>
          <ul>
              <li><strong>Media Collection:</strong> Stores primary high-resolution video tracks (<code>.mp4</code>), pipeline statuses, and final master playlist paths.</li>
              <li><strong>Files Collection:</strong> Captures parallel sidecar assets (<code>.wav</code> / <code>.m4a</code> audio stems, <code>.srt</code> / <code>.vtt</code> subtitles) bound explicitly to their parent ID.</li>
          </ul>

          <h4>Flat Namespace Optimization</h4>
          <p>To eliminate pseudo-directory overhead in cloud storage buckets, Payload hooks intercept creations and split file identifiers using a secure <code>clean_title__random_hash.ext</code> token.</p>
<pre><code class="language-typescript">// src/collections/Files.ts
beforeOperation: [
  ({ args, operation }: any) => {
    if (operation === 'create' && file) {
      const baseName = data.base_name || file.name.split('.')[0]
      const originalName = file.name
      const ext = originalName.split('.').pop()?.toLowerCase()
      const hash = crypto.randomBytes(4).toString('hex')
      const cleanFolder = baseName.toLowerCase().replace(/[^a-z0-9_]/g, '_')

      // Clean, single-prefix namespace token (no double prefix)
      file.name = `${cleanFolder}__${hash}.${ext}`
    }
    return args
  }
]</code></pre>
      </template>

      <!-- Module 2: Orchestration -->
      <template id="content-2">
          <p>The Multi-File Orchestration Edge is powered by <strong>GCP EventArc & Cloud Run</strong>. When files hit the input Google Cloud Storage bucket, GCP Eventarc captures distinct object finalization signals and fires parallel webhooks.</p>
          
          <h4>The Self-Healing Guardrail (Pacifier Pattern)</h4>
          <p>The cached, elevated Python <code>vod-trigger-function</code> intercepts the multi-file wave. If sidecar tracks finish uploading ahead of the primary heavy <code>.mp4</code>, the instance safely logs the imbalance and bails with a standard 200 OK without throwing errors or locking the pipeline.</p>

<pre><code class="language-python"># main.py
def trigger_mediaconvert(cloud_event: CloudEvent):
    # ... setup and namespace extraction ...
    
    # --- RACE CONDITION PROTECTION & ORDER ORDINATION ---
    bundle_files = check_asset_bundle_complete(bucket_name, folder_prefix)
    
    if bundle_files == "LOCKED": 
        print(f"🔒 Job is actively locked and processing for token '{folder_prefix}'. Exiting cleanly.")
        return "Job Already Locked", 200
        
    if not bundle_files: 
        print(f"⏳ Bundle package '{folder_prefix}' incomplete. Awaiting remaining sibling tracks...")
        return "Awaiting Remaining Sibling Files", 200</code></pre>

          <h4>Deterministic Concurrency Control</h4>
          <p>When all sibling files are validated, the highest-velocity thread attempts an atomic metadata operation via <code>if_generation_match=0</code> to claim the unique tracking lock (<code>___mediaconvert.lock</code>). The winner uses ambient compute credentials to sign secure time-delimited v4 URLs and forwards the settings schema to AWS.</p>
      </template>

      <!-- Module 3: Transcoding -->
      <template id="content-3">
          <p>AWS serves as the heavy transcoding factory via the <strong>AWS Elemental MediaConvert</strong> Compute Transcoding Engine. The incoming JSON job definition defines the processing parameters dynamically, mapping out adaptive bitrate rules, audio selector inclusions, and subtitle sidecar injection.</p>
          
          <h4>Clean HLS Pathing & Schema</h4>
          <p>MediaConvert reads the inputs via the signed GCP URLs and transcodes them into HLS fragments, rendering the outputs directly to your outbound S3 bucket under an identical nested subdirectory structure.</p>
          <p><strong>Critical Guardrail:</strong> The API requires explicit <code>ContainerSettings: { Container: "M3U8" }</code> within the Output Group JSON to successfully map the H.264 codec to an Apple HLS playlist.</p>

<pre><code class="language-json">"OutputGroups": [{

      <!-- Module 4: CDN Distribution -->
      <template id="content-4">
          <p><strong>AWS CloudFront & S3</strong> establish the Content Delivery Edge. Rather than serving directly from the S3 output bucket, AWS CloudFront acts as the CDN layer, retrieving the transcoded assets and distributing them to edge nodes globally to minimize latency and origin load.</p>
          
          <h4>Secured Origin Storage & OAC</h4>
          <p>The output S3 bucket employs strict security perimeters. "Block All Public Access" is <strong>ON</strong>, and an S3 Bucket Policy (Origin Access Control) enforces that the bucket only accepts requests routed through the designated CloudFront distribution.</p>
          
          <h4>Differential Caching & CORS</h4>
          <p>The CDN implements strict path-pattern routing to apply optimized caching rules tailored specifically for HTTP Live Streaming (HLS):</p>
          <ul>
              <li><strong>Media Fragments (<code>.ts</code> / <code>.m4s</code>):</strong> Aggressive cache policies with a high TTL. Immutable video chunks remain cached at the edge for maximum offload.</li>
              <li><strong>VOD Manifests (<code>.m3u8</code>):</strong> Moderate TTLs and strict Cache-Control headers prevent edge nodes from serving stale index data.</li>
          </ul>
          <p>A permissive CORS policy on S3 allows <code>GET</code>/<code>HEAD</code> requests from all origins (<code>*</code>) to satisfy Shaka Player's XHR requirements.</p>
      </template>

      <!-- Module 5: Edge Security -->
      <template id="content-5">
          <p>To prevent unauthorized CDN scraping, the pipeline implements a <strong>Zero-Trust Security Perimeter</strong> using a custom 2-part JWT logic (<code>payload.signature</code>) validated directly at the CloudFront edge.</p>
          
          <h4>CMS Administrative Minting (Cookie Auth)</h4>
          <p>Token generation is strictly bounded to the Payload CMS interface. An admin uses a custom UI component to ping the internal <code>/api/media/mint-token</code> endpoint. Because this relies entirely on Payload's HTTP-only session cookies, external programmatic access (via Bearer tokens) is structurally blocked.</p>

<pre><code class="language-typescript">// src/collections/Media.ts
endpoints: [
  {
    path: '/mint-token',
    method: 'get',
    handler: async (req) => {
      // 1. Strict session gating blocks automated scraper bots
      if (!req.user) return Response.json({ error: 'Unauthorized' }, { status: 401 })

      const secret = process.env.JWT_SECRET
      const expirationSeconds = Math.floor(Date.now() / 1000) + (15 * 60)

      // 2. Microscopic Base64URL payload targeting edge bandwidth entropy
      const payloadBase64Url = Buffer.from(JSON.stringify({ exp: expirationSeconds })).toString('base64url')
      
      const hmac = crypto.createHmac('sha256', secret)
      hmac.update(payloadBase64Url)
      
      // 3. Output custom 2-part passport (payload.signature)
      return Response.json({ token: `${payloadBase64Url}.${hmac.digest('base64url')}` })
    }
  }
]</code></pre>

          <h4>1-Millisecond Edge Firewall</h4>
          <p>The frontend Shaka Player dynamically injects the resulting string into the <code>X-OTT-Access-Token</code> request header. A CloudFront Viewer-Request Function intercepts this header before the CDN cache is ever checked.</p>
          <p>In roughly <code>0.08ms</code> (consuming &lt;10 compute utilization units), the ES5 engine recalculates the HMAC-SHA256 signature mathematically. If the provided signature is forged, or if the 15-minute lease (TTL) has expired, the connection is instantly severed with a <code>403 Forbidden</code>.</p>
      </template>

      <!-- Module 6: Telemetry Loops -->
      <template id="content-6">
          <p>To securely and deterministically notify the CMS when transcoding succeeds or fails, we implement <strong>Telemetry Loops & Automated Garbage Collection</strong>.</p>
          
          <h4>Secured API Destination Routing</h4>
          <p><strong>AWS EventBridge</strong> filters out non-actionable job phase changes, isolating the exact moment a transcode hits <code>COMPLETE</code> or <code>ERROR</code>. It bypasses the noise of messaging queues by utilizing an authenticated EventBridge Connection to securely manage and inject a Bearer credential, POSTing the payload straight back to the Payload CMS API Destination.</p>

          <h4>State Updates & Cleanup</h4>
          <p>The custom Next.js endpoint <code>/api/webhooks/mediaconvert</code> updates the document state, logs time-stamped telemetry data, and immediately triggers garbage collection to delete the initial lock file from Google Cloud Storage.</p>

<pre><code class="language-typescript">// src/endpoints/mediaconvert.ts
export const mediaconvertWebhook: Endpoint = {
  path: '/webhooks/mediaconvert',
  method: 'post',
  handler: async (req) => {
    // ... EventBridge processing ...
      
    // Unlock the GCS Bundle (Garbage Collection)
    try {
      console.log(`🔓 [Garbage Collection] Removing lock file for: ${folderPrefix}`)
      await gcpBucket.file(`${folderPrefix}___mediaconvert.lock`).delete({ ignoreNotFound: true })
    } catch (err) {
      console.error(`⚠️ [Garbage Collection] Failed to delete lock for ${folderPrefix}:`, err)
    }

    // Update the Document State
    if (jobStatus === 'COMPLETE') {
      const manifestUrl = `https://${cdnDomain}/${folderPrefix}/${folderPrefix}.m3u8`

      await req.payload.update({
        collection: 'media',
        id: mediaId,
        data: {
          status: 'ready',
          manifest_url: manifestUrl,
          logs: `AWS Webhook COMPLETE: Transcode finished.`,
        },
      })
    }
  }
}</code></pre>
      </template>

      <!-- Module 7: Post-Mortem -->
      <template id="content-7">
          <p>The core architectural mandate of this pipeline is minimizing operational entropy—the unpredictable states, race conditions, and network failures inherent in distributed cloud systems. Rather than attempting to control systemic chaos via bloated orchestration layers or expensive polling loops, this pipeline relies on <strong>bottom-up, deterministic execution</strong>.</p>
          
          <h4>The Minimax Takeaway: Deterministic Systems Engineering</h4>
          <ul>
              <li><strong>State Deflection via Atomic Operations:</strong> In distributed systems, concurrency is guaranteed, but execution order is not. By leveraging atomic metadata locks (<code>if_generation_match=0</code>) directly at the GCS layer, the system inherently prevents state collisions.</li>
              <li><strong>Bounded Substrate Responsibilities:</strong> Cloud boundaries are utilized as deliberate constraints to isolate failure domains. Payload CMS and PostgreSQL are strictly bounded to relational data modeling; GCP Eventarc handles high-throughput ingestion; and AWS is dedicated exclusively to heavy compute and delivery.</li>
              <li><strong>Structural Guardrails over Network Chance:</strong> The self-healing guardrails—such as verifying the complete presence of sibling files before attempting to claim a lock—ensure that processing only begins when the environment reaches a mathematically complete state.</li>
          </ul>

          <h4>Enterprise-Grade Resiliency Patterns</h4>
          <ul>
              <li><strong>Idempotent Pipeline Design:</strong> Asynchronous file ingestion pipelines guarantee that multi-file asset bundles (e.g., video, audio stems, subtitle sidecars) can be processed sequentially or out-of-order without triggering race conditions or runaway compute billing.</li>
              <li><strong>Zero-Trust Handoffs:</strong> Inter-cloud API handoffs incorporate cryptographic signatures and strict schema validation to ensure zero-defect infrastructure-as-code deployments across boundaries.</li>
          </ul>

          <p class="mt-8 italic text-center font-medium">This pipeline demonstrates that true resilience is not achieved by building heavier error-handling mechanisms, but by designing an architecture where invalid states are structurally impossible to process.</p>
      </template>

        var isDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
        
        if (isDark) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        updateHighlightTheme(isDark);
        return isDark;
    }

    function updateHighlightTheme(isDark) {
        var link = document.getElementById('hljs-theme');
        link.href = isDark 
            ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" 
            : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";
    }

    function updateActiveTabBorder(isDark) {
        var activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) {
            activeTab.classList.remove('border-black', 'border-white');
            activeTab.classList.add(isDark ? 'border-white' : 'border-black');
        }
    }

    // --- D3 PHYSICS ENGINE INITIALIZATION ---
    
    var nodesData = [
        { id: 'payload', label: 'Payload CMS', color: '#3b82f6', targetIndex: 0 },
        { id: 'gcs', label: 'GCS EventArc', color: '#f97316', targetIndex: 1 },
        { id: 'cloudrun', label: 'Cloud Run', color: '#f97316', targetIndex: 2 },
        { id: 'mediaconvert', label: 'MediaConvert', color: '#10b981', targetIndex: 3 },
        { id: 's3', label: 'S3 Origin', color: '#a855f7', targetIndex: 4 },
        { id: 'cloudfront', label: 'CloudFront CDN', color: '#a855f7', targetIndex: 5 },
        { id: 'client', label: 'Client Playback', color: '#f43f5e', targetIndex: 6 },
        { id: 'eventbridge', label: 'EventBridge', color: '#3b82f6', targetIndex: 2.5 }
    ];

    var linksData = [
        { source: 'payload', target: 'gcs' },
        { source: 'gcs', target: 'cloudrun' },
        { source: 'cloudrun', target: 'mediaconvert' },
        { source: 'mediaconvert', target: 's3' },
        { source: 's3', target: 'cloudfront' },
        { source: 'cloudfront', target: 'client' },
        { source: 'mediaconvert', target: 'eventbridge' },
        { source: 'eventbridge', target: 'payload' },
        { source: 'payload', target: 'client' }
    ];

    var simulation, svg, link, node;
    var activeCardId = null;

    function updateForces() {
        var container = document.getElementById('d3-graph-container');
        if (!container) return;
        
        var w = container.clientWidth || 1000;
        var h = container.clientHeight || 550;
        
        var isVertical = (w / h) < 1.2;

        svg.attr("viewBox", `0 0 ${w} ${h}`);

        simulation.force("center", d3.forceCenter(w / 2, h / 2))
                  .force("collide", d3.forceCollide().radius(isVertical ? 35 : 45))
                  .force("link").distance(isVertical ? 60 : 100);

        simulation.force("x", d3.forceX(d => {
            if (isVertical) {
                if (d.id === 'eventbridge') return w * 0.75;
                return d.targetIndex % 2 === 0 ? w * 0.35 : w * 0.55; 
            } else {
                var stageNorm = d.targetIndex / 6; 
                return w * (0.1 + stageNorm * 0.8); 
            }
        }).strength(0.8));

        simulation.force("y", d3.forceY(d => {
            if (isVertical) {
                var stageNorm = d.targetIndex / 6;
                return h * (0.15 + stageNorm * 0.7);
            } else {
                if (d.id === 'eventbridge') return h * 0.25;
                return d.targetIndex % 2 === 0 ? h * 0.55 : h * 0.75;
            }
        }).strength(0.8));

        simulation.alpha(0.3).restart();
    }

    function initD3() {
        d3.select("#d3-graph-container").selectAll("*").remove();

        svg = d3.select("#d3-graph-container").append("svg")
            .attr("width", "100%")
            .attr("height", "100%");

        var defs = svg.append("defs");
        var markers = [
            { id: "arrow-light", color: "rgba(0,0,0,0.15)" },
            { id: "arrow-dark", color: "rgba(255,255,255,0.15)" },
            { id: "arrow-active-light", color: "#000000" },
            { id: "arrow-active-dark", color: "#ffffff" }
        ];

        defs.selectAll("marker")
            .data(markers)
            .enter().append("marker")
            .attr("id", d => d.id)
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 26) 
            .attr("refY", 0)
            .attr("markerWidth", 5)
            .attr("markerHeight", 5)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M 0,-4 L 10,0 L 0,4 L 3,0 Z") 
            .attr("fill", d => d.color);

        simulation = d3.forceSimulation(nodesData)
            .force("link", d3.forceLink(linksData).id(d => d.id).strength(0.5))
            .force("charge", d3.forceManyBody().strength(-1000));

        link = svg.append("g")
            .attr("class", "links")
            .selectAll("path")
            .data(linksData)
            .enter().append("path")
            .attr("class", "flow-link flow-line")
            .attr("fill", "none")
            .attr("stroke-width", 2);

        node = svg.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(nodesData)
            .enter().append("g")
            .attr("class", "node-group cursor-pointer")
            .attr("id", d => `node-${d.id}`)
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("click", (event, d) => {
                var tab = document.querySelector(`.tab-btn[data-nodes*="node-${d.id}"]`);
                if(tab) selectModule(tab);
            });

        node.append("circle")
            .attr("r", 20)
            .attr("class", "node-bg");

        node.append("circle")
            .attr("r", 5)
            .attr("fill", d => d.color)
            .attr("class", "shadow-sm");

        node.append("text")
            .attr("dy", 38)
            .attr("text-anchor", "middle")
            .attr("class", "node-text font-mono text-[11px] pointer-events-none")
            .text(d => d.label);

        simulation.on("tick", () => {
            link.attr("d", d => {
                if (!d.source || !d.target || d.source.x === undefined) return "";
                var dx = d.target.x - d.source.x,
                    dy = d.target.y - d.source.y;
                var sourceId = d.source.id || d.source;
                var targetId = d.target.id || d.target;

                if (sourceId === 'eventbridge' || targetId === 'eventbridge') {
                    var dr = Math.sqrt(dx * dx + dy * dy) * 1.5; 
                    return `M${d.source.x},${d.source.y} A${dr},${dr} 0 0,0 ${d.target.x},${d.target.y}`;
                }
                
                return `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`;
            });

            node.attr("transform", d => {
                var container = document.getElementById('d3-graph-container');
                var w = container ? container.clientWidth : 1000;
                var h = container ? container.clientHeight : 550;
                if (d.x === undefined || d.y === undefined) return "";
                d.x = Math.max(25, Math.min(w - 25, d.x));
                d.y = Math.max(25, Math.min(h - 25, d.y));
                return `translate(${d.x},${d.y})`;
            });
        });

        updateForces();
        updateD3Theme(document.documentElement.classList.contains('dark'));
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    function updateD3Theme(isDark) {
        if(!svg) return;
        
        var activeTab = activeCardId ? document.querySelector(`.tab-btn[data-id="${activeCardId}"]`) : null;
        var targetNodes = activeTab && activeTab.dataset.nodes ? activeTab.dataset.nodes.split(',') : [];

        d3.selectAll('.flow-link')
            .attr("stroke", d => {
                var sourceId = d.source.id || d.source;
                var targetId = d.target.id || d.target;
                var isActive = targetNodes.includes(`node-${sourceId}`) && targetNodes.includes(`node-${targetId}`);
                if (activeCardId === "7") return isDark ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.4)";
                if (isActive) return isDark ? "#fff" : "#000";
                return isDark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.1)";
            })
            .attr("marker-end", d => {
                var sourceId = d.source.id || d.source;
                var targetId = d.target.id || d.target;
                var isActive = targetNodes.includes(`node-${sourceId}`) && targetNodes.includes(`node-${targetId}`);
                if (activeCardId === "7") return isDark ? "url(#arrow-dark)" : "url(#arrow-light)";
                if (isActive) return isDark ? "url(#arrow-active-dark)" : "url(#arrow-active-light)";
                return isDark ? "url(#arrow-dark)" : "url(#arrow-light)";
            });

        d3.selectAll('.node-bg')
            .attr("class", d => {
                var isActive = targetNodes.includes(`node-${d.id}`) || activeCardId === "7";
                if (isActive) return isDark ? "node-bg fill-black stroke-white stroke-[2px]" : "node-bg fill-white stroke-black stroke-[2px]";
                return isDark ? "node-bg fill-[#0a0a0a] stroke-white/10 stroke-[1px]" : "node-bg fill-white stroke-gray-200 stroke-[1.5px]";
            });

        d3.selectAll('.node-text')
            .attr("class", d => {
                var isActive = targetNodes.includes(`node-${d.id}`) || activeCardId === "7";
                if (isActive) return isDark ? "node-text font-mono text-[11px] font-bold fill-white pointer-events-none" : "node-text font-mono text-[11px] font-bold fill-black pointer-events-none";
                return isDark ? "node-text font-mono text-[11px] font-medium fill-zinc-500 pointer-events-none" : "node-text font-mono text-[11px] font-medium fill-gray-400 pointer-events-none";
            });
    }

    // --- CMS MODULE BINDING ---
    var playbookTitles = {
        "1": "CMS Ingestion & Namespace Optimization",
        "2": "Serverless Orchestration & Pacifier Pattern",
        "3": "Compute Transcoding Engine",
        "4": "Global CDN Distribution & Caching",
        "5": "Zero-Trust Edge Security Perimeter",
        "6": "Telemetry Loops & Garbage Collection",
        "7": "Deterministic Systems Engineering"
    };

    function selectModule(tabElement) {
        var id = tabElement.dataset.id;
        var targetNodes = tabElement.dataset.nodes.split(',');
        var isDark = document.documentElement.classList.contains('dark');

        if (activeCardId === id) return; 

        activeCardId = id;

        // Reset all tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active', 'border-black', 'dark:border-white', 'text-black', 'dark:text-white');
            btn.classList.add('border-transparent', 'text-gray-500', 'dark:text-zinc-400');
        });

        // Highlight active tab
        tabElement.classList.add('active', 'text-black', 'dark:text-white');
        tabElement.classList.remove('border-transparent', 'text-gray-500', 'dark:text-zinc-400');
        tabElement.classList.add(isDark ? 'border-white' : 'border-black');

        // Update Reading Pane
        var paneTitle = document.getElementById('pane-title');
        var paneContent = document.getElementById('reading-pane');
        
        paneTitle.innerText = playbookTitles[id];
        paneContent.innerHTML = document.getElementById('content-' + id).innerHTML;

        document.querySelectorAll('#reading-pane pre code').forEach((block) => hljs.highlightElement(block));

        // Instruct D3 Engine to Highlight Focus Areas
        d3.selectAll('.node-group').transition().duration(400)
            .style("opacity", d => (targetNodes.includes(`node-${d.id}`) || id === "7") ? 1 : 0.35);
            
        d3.selectAll('.flow-link').transition().duration(400)
            .attr("class", d => {
                var sourceId = d.source.id || d.source;
                var targetId = d.target.id || d.target;
                var isActive = targetNodes.includes(`node-${sourceId}`) && targetNodes.includes(`node-${targetId}`);
                return isActive ? "flow-link flow-line active-link" : "flow-link flow-line";
            });

        updateD3Theme(isDark);
    }

    // --- BOOTSTRAP & RESIZE HANDLING ---
    var resizeTimer;

    window.addEventListener('load', () => {
        var isDark = initTheme();
        initD3();
        
        var firstModule = document.querySelector('.tab-btn');
        if(firstModule) selectModule(firstModule);
        
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if(simulation) updateForces();
            }, 150);
        });
    });

  </script>
</body>
</html>
